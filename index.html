<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumin Help - EV Trip Planner</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Lumin Help 🚙</h2>
            <a href="howto.html" style="font-size: 13px; color: #1a73e8; text-decoration: none; font-weight: bold; background: #e8f0fe; padding: 6px 12px; border-radius: 20px; transition: background 0.2s;">
                💡 วิธีใช้
            </a>
        </div>
        <p style="color: #666; font-size: 14px; margin-top: 5px;">ระบบประเมินการเดินทางสำหรับ Changan Lumin L</p>

        <div class="form-group">
            <label>ต้นทาง:</label>
            <div style="display: flex; gap: 4px;">
                <input type="text" id="origin" placeholder="เช่น กรุงเทพมหานคร แล้วกด 🔍">
                <button class="btn-pin" onclick="searchLocation('origin')" title="ค้นหาสถานที่">🔍</button>
                <button id="btn-pin-origin" class="btn-pin" onclick="enablePinMode('origin')" title="คลิกบนแผนที่เพื่อปักหมุดต้นทาง">📍</button>
            </div>
        </div>

        <div class="form-group">
            <label>ปลายทาง:</label>
            <div style="display: flex; gap: 4px;">
                <input type="text" id="destination" placeholder="เช่น พัทยา ชลบุรี แล้วกด 🔍">
                <button class="btn-pin" onclick="searchLocation('destination')" title="ค้นหาสถานที่">🔍</button>
                <button id="btn-pin-destination" class="btn-pin" onclick="enablePinMode('destination')" title="คลิกบนแผนที่เพื่อปักหมุดปลายทาง">📍</button>
            </div>
        </div>

        <div class="form-group">
            <label>รุ่นรถ Changan Lumin L:</label>
            <select id="carModel">
                <option value="AC">Lumin L AC (วิ่งได้ 210 กม.)</option>
                <option value="DC">Lumin L DC (วิ่งได้ 301 กม.)</option>
            </select>
        </div>

        <div class="form-group">
            <label>แบตเตอรี่ปัจจุบัน (%):</label>
            <input type="number" id="battery" value="100" min="1" max="100">
        </div>

        <button class="btn-calculate" onclick="calculateRoute()">คำนวณการเดินทาง</button>

        <div id="result-panel" class="result-box" style="display:none;">
            <h3>📊 สรุปการเดินทาง</h3>
            <p>ระยะทางถึงปลายทาง: <strong><span id="res-distance">-</span> กม.</strong></p>
            <p>ระยะทางที่รถวิ่งได้จริง: <strong><span id="res-range">-</span> กม.</strong></p>
            <div id="res-warning" class="warning-text"></div>
            <button class="btn-share-gmaps" onclick="shareToGoogleMap()">🗺️ นำทางด้วย Google Maps</button>
        </div>
        
        <div style="margin-top: auto; padding-top: 25px; padding-bottom: 5px; font-size: 12px; color: #888; text-align: center;">
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
            Contribute by <strong>Mr.Abdulloh Etaeluengoh</strong><br>
            Email : <a href="mailto:Abdulloh.eg@gmail.com" style="color: #1a73e8; text-decoration: none;">Abdulloh.eg@gmail.com</a>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/app.js"></script>
</body>

</html>
